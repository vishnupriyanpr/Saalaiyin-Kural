<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saalai Kural Assistant — Road Safety Citizen Guide</title>
    <meta name="description" content="AI-powered road safety assistant for Indian citizens. Get guidance on road issues, traffic rules, and safety tips.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-primary: #0a0e1a;
            --bg-secondary: #111827;
            --bg-glass: rgba(255,255,255,0.035);
            --bg-glass-hover: rgba(255,255,255,0.07);
            --border-glass: rgba(255,255,255,0.08);
            --accent: #f59e0b;
            --accent-dark: #d97706;
            --accent-soft: rgba(245,158,11,0.12);
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --bot-bg: rgba(30,41,59,0.65);
            --user-start: #f59e0b;
            --user-end: #d97706;
            --error: #ef4444;
            --success: #22c55e;
            --font: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
            --radius: 18px;
            --radius-sm: 12px;
            --shadow-glow: 0 0 40px rgba(245,158,11,0.06);
        }

        html, body {
            height: 100%;
            font-family: var(--font);
            background: linear-gradient(160deg, var(--bg-primary) 0%, #0f1629 40%, var(--bg-secondary) 100%);
            color: var(--text-primary);
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* ── App Shell ── */
        #app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh;
            max-width: 760px;
            margin: 0 auto;
            position: relative;
        }

        /* ── Header ── */
        #chat-header {
            padding: 16px 20px;
            background: var(--bg-glass);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-bottom: 1px solid var(--border-glass);
            flex-shrink: 0;
            z-index: 10;
        }
        .header-inner {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .logo-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            box-shadow: 0 4px 16px rgba(245,158,11,0.25);
            flex-shrink: 0;
        }
        .logo-text h1 {
            font-size: 17px;
            font-weight: 700;
            letter-spacing: -0.3px;
            color: var(--text-primary);
        }
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 11.5px;
            color: var(--success);
            font-weight: 500;
            margin-top: 2px;
        }
        .status-dot {
            width: 6px;
            height: 6px;
            background: var(--success);
            border-radius: 50%;
            animation: pulse-dot 2s ease-in-out infinite;
        }
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.85); }
        }

        /* ── Messages Area ── */
        #chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
            scrollbar-width: thin;
            scrollbar-color: rgba(255,255,255,0.08) transparent;
        }
        #chat-messages::-webkit-scrollbar { width: 5px; }
        #chat-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        #chat-messages::-webkit-scrollbar-track { background: transparent; }

        /* ── Message Bubbles ── */
        .message {
            display: flex;
            gap: 10px;
            max-width: 88%;
            animation: msg-in 0.35s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes msg-in {
            from { opacity: 0; transform: translateY(12px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .message.user { align-self: flex-end; flex-direction: row-reverse; }
        .message.bot { align-self: flex-start; }

        .msg-avatar {
            width: 32px;
            height: 32px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            flex-shrink: 0;
            margin-top: 2px;
        }
        .bot .msg-avatar {
            background: var(--accent-soft);
        }
        .user .msg-avatar {
            background: rgba(99,102,241,0.15);
        }

        .msg-content {
            padding: 12px 16px;
            border-radius: var(--radius);
            line-height: 1.6;
            font-size: 14px;
            word-break: break-word;
        }
        .bot .msg-content {
            background: var(--bot-bg);
            border: 1px solid var(--border-glass);
            border-bottom-left-radius: 6px;
            backdrop-filter: blur(8px);
        }
        .user .msg-content {
            background: linear-gradient(135deg, var(--user-start), var(--user-end));
            color: #1a1a2e;
            font-weight: 500;
            border-bottom-right-radius: 6px;
        }

        /* ── Category Badge ── */
        .category-badge {
            display: inline-block;
            font-size: 10.5px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.7px;
            padding: 3px 8px;
            border-radius: 6px;
            margin-bottom: 6px;
            background: var(--accent-soft);
            color: var(--accent);
        }
        .category-badge.emergency {
            background: rgba(239,68,68,0.15);
            color: #f87171;
        }
        .category-badge.verify {
            background: rgba(99,102,241,0.12);
            color: #a5b4fc;
        }

        /* ── Guidance Disclaimer ── */
        .guidance-note {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 8px;
            padding-top: 6px;
            border-top: 1px solid rgba(255,255,255,0.05);
            font-style: italic;
        }

        /* ── Typing Indicator ── */
        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
            max-width: 88%;
            align-self: flex-start;
            animation: msg-in 0.3s ease-out;
        }
        .typing-dots {
            display: flex;
            gap: 4px;
            padding: 14px 18px;
            background: var(--bot-bg);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius);
            border-bottom-left-radius: 6px;
        }
        .typing-dots span {
            width: 7px;
            height: 7px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: bounce-dot 1.4s ease-in-out infinite;
        }
        .typing-dots span:nth-child(2) { animation-delay: 0.16s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.32s; }
        @keyframes bounce-dot {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-6px); opacity: 1; }
        }

        /* ── Follow-up Chips ── */
        #follow-up-chips {
            padding: 0 16px 8px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            flex-shrink: 0;
        }
        #follow-up-chips.hidden { display: none; }
        .chip {
            padding: 8px 14px;
            font-size: 12.5px;
            font-weight: 500;
            font-family: var(--font);
            background: var(--bg-glass);
            border: 1px solid var(--border-glass);
            border-radius: 20px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }
        .chip:hover {
            background: var(--accent-soft);
            border-color: rgba(245,158,11,0.25);
            color: var(--accent);
            transform: translateY(-1px);
        }
        .chip:active { transform: scale(0.97); }

        /* ── Input Area ── */
        #chat-input-area {
            padding: 12px 16px 16px;
            background: var(--bg-glass);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-top: 1px solid var(--border-glass);
            flex-shrink: 0;
        }
        .input-row {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }
        #message-input {
            flex: 1;
            padding: 12px 16px;
            font-size: 14px;
            font-family: var(--font);
            background: rgba(15,23,42,0.6);
            border: 1px solid var(--border-glass);
            border-radius: 14px;
            color: var(--text-primary);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            resize: none;
        }
        #message-input::placeholder { color: var(--text-muted); }
        #message-input:focus {
            border-color: rgba(245,158,11,0.4);
            box-shadow: 0 0 0 3px rgba(245,158,11,0.08);
        }
        #send-btn {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            flex-shrink: 0;
            box-shadow: 0 2px 10px rgba(245,158,11,0.2);
        }
        #send-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(245,158,11,0.3); }
        #send-btn:active { transform: scale(0.95); }
        #send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }
        #send-btn svg { width: 20px; height: 20px; fill: #1a1a2e; }

        .disclaimer {
            text-align: center;
            font-size: 10.5px;
            color: var(--text-muted);
            margin-top: 8px;
            letter-spacing: 0.1px;
        }

        /* ── Welcome Card ── */
        .welcome-card {
            text-align: center;
            padding: 32px 20px;
            animation: msg-in 0.5s ease-out;
        }
        .welcome-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }
        .welcome-card h2 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 6px;
            background: linear-gradient(135deg, var(--accent), #fbbf24);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .welcome-card p {
            font-size: 13.5px;
            color: var(--text-secondary);
            line-height: 1.6;
            max-width: 400px;
            margin: 0 auto 16px;
        }
        .welcome-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-top: 16px;
        }

        /* ── Error Toast ── */
        .error-toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-80px);
            background: rgba(239,68,68,0.9);
            backdrop-filter: blur(12px);
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 500;
            z-index: 100;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 8px 24px rgba(239,68,68,0.3);
        }
        .error-toast.show { transform: translateX(-50%) translateY(0); }

        /* ── Responsive ── */
        @media (max-width: 480px) {
            .message { max-width: 92%; }
            .msg-content { font-size: 13.5px; }
            .header-inner { gap: 10px; }
            .logo-icon { width: 38px; height: 38px; font-size: 19px; }
            .logo-text h1 { font-size: 15px; }
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header id="chat-header">
            <div class="header-inner">
                <div class="logo-icon">🛡️</div>
                <div class="logo-text">
                    <h1>Saalai Kural Assistant</h1>
                    <div class="status-badge">
                        <span class="status-dot"></span>
                        Online
                    </div>
                </div>
            </div>
        </header>

        <!-- Messages -->
        <main id="chat-messages"></main>

        <!-- Follow-up Chips -->
        <div id="follow-up-chips" class="hidden"></div>

        <!-- Input -->
        <footer id="chat-input-area">
            <div class="input-row">
                <input type="text" id="message-input" placeholder="Ask about road safety, report a road issue..." autocomplete="off" maxlength="2000">
                <button id="send-btn" title="Send message" disabled>
                    <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                </button>
            </div>
            <p class="disclaimer">General guidance only — verify with authorities for official information.</p>
        </footer>
    </div>

    <!-- Error Toast -->
    <div id="error-toast" class="error-toast"></div>

    <script>
    // ════════════════════════════════════════════════════════════
    //  CONFIGURATION
    //  Use webhook-test while developing (requires "Test workflow" active in n8n editor)
    //  Switch to /webhook/ (remove -test) once you toggle the workflow Active
    // ════════════════════════════════════════════════════════════
    const WEBHOOK_URL = 'https://vishnun8nnnn.app.n8n.cloud/webhook-test/roadwatch-chat';

    const messagesEl = document.getElementById('chat-messages');
    const inputEl = document.getElementById('message-input');
    const sendBtn = document.getElementById('send-btn');
    const chipsEl = document.getElementById('follow-up-chips');
    const toastEl = document.getElementById('error-toast');

    let isLoading = false;

    // ── Render Welcome Screen ──
    function renderWelcome() {
        const starters = [
            'How do I report a pothole?',
            'Road safety tips for two-wheelers',
            'What to do after a road accident?',
            'Documents I should carry while driving'
        ];
        const chipsHTML = starters.map(s =>
            `<button class="chip" onclick="sendMessage('${s.replace(/'/g, "\\'")}')">${s}</button>`
        ).join('');

        messagesEl.innerHTML = `
            <div class="welcome-card">
                <div class="welcome-icon">🛣️</div>
                <h2>Welcome to Saalai Kural</h2>
                <p>I'm your road safety assistant for India. Ask me about road safety tips, how to report road issues, traffic rules, or what to do in an emergency.</p>
                <div class="welcome-chips">${chipsHTML}</div>
            </div>
        `;
    }

    // ── Add Message Bubble ──
    function addMessage(text, type, meta = {}) {
        // Remove welcome card on first message
        const welcome = messagesEl.querySelector('.welcome-card');
        if (welcome) welcome.remove();

        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${type}`;

        const avatar = type === 'bot' ? '🛡️' : '👤';
        let contentHTML = '';

        if (type === 'bot' && meta.category && meta.category !== 'error' && meta.category !== 'general') {
            const badgeClass = meta.category === 'emergency' ? 'emergency' :
                               meta.guidance_type === 'verify_with_authorities' ? 'verify' : '';
            const label = meta.category.replace(/_/g, ' ');
            contentHTML += `<div class="category-badge ${badgeClass}">${label}</div>`;
        }

        // Format text: convert numbered lists and line breaks
        const formatted = text
            .replace(/\n\n/g, '<br><br>')
            .replace(/\n(\d+)\.\s/g, '<br>$1. ')
            .replace(/\n[-•]\s/g, '<br>• ')
            .replace(/\n/g, '<br>');
        contentHTML += `<div>${formatted}</div>`;

        if (type === 'bot' && meta.guidance_type === 'verify_with_authorities') {
            contentHTML += `<div class="guidance-note">ℹ️ This is general guidance. Please verify specifics with the relevant authority.</div>`;
        }
        if (type === 'bot' && meta.guidance_type === 'emergency_action') {
            contentHTML += `<div class="guidance-note" style="color:#f87171;">⚠️ If this is an active emergency, call 112 immediately.</div>`;
        }

        msgDiv.innerHTML = `
            <div class="msg-avatar">${avatar}</div>
            <div class="msg-content">${contentHTML}</div>
        `;
        messagesEl.appendChild(msgDiv);
        scrollToBottom();
    }

    // ── Typing Indicator ──
    function showTyping() {
        const el = document.createElement('div');
        el.className = 'typing-indicator';
        el.id = 'typing';
        el.innerHTML = `
            <div class="msg-avatar" style="background:var(--accent-soft);">🛡️</div>
            <div class="typing-dots"><span></span><span></span><span></span></div>
        `;
        messagesEl.appendChild(el);
        scrollToBottom();
    }
    function hideTyping() {
        const el = document.getElementById('typing');
        if (el) el.remove();
    }

    // ── Follow-up Chips ──
    function showChips(options) {
        if (!options || !options.length) {
            chipsEl.classList.add('hidden');
            return;
        }
        chipsEl.innerHTML = options.map(opt =>
            `<button class="chip" onclick="sendMessage('${opt.replace(/'/g, "\\'")}')">${opt}</button>`
        ).join('');
        chipsEl.classList.remove('hidden');
    }

    // ── Error Toast ──
    function showToast(msg) {
        toastEl.textContent = msg;
        toastEl.classList.add('show');
        setTimeout(() => toastEl.classList.remove('show'), 4000);
    }

    // ── Scroll ──
    function scrollToBottom() {
        requestAnimationFrame(() => {
            messagesEl.scrollTop = messagesEl.scrollHeight;
        });
    }

    // ── Send Message ──
    async function sendMessage(text) {
        const msg = (text || inputEl.value || '').trim();
        if (!msg || isLoading) return;

        // Check webhook URL
        if (WEBHOOK_URL === 'YOUR_N8N_WEBHOOK_URL_HERE') {
            showToast('Please set your n8n webhook URL in the script configuration.');
            return;
        }

        isLoading = true;
        inputEl.value = '';
        inputEl.disabled = true;
        sendBtn.disabled = true;
        chipsEl.classList.add('hidden');

        addMessage(msg, 'user');
        showTyping();

        try {
            const controller = new AbortController();
            const timeout = setTimeout(() => controller.abort(), 20000);

            const res = await fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify({ message: msg }),
                signal: controller.signal
            });
            clearTimeout(timeout);

            if (!res.ok) {
                throw new Error(`Server returned ${res.status}`);
            }

            const data = await res.json();

            hideTyping();

            if (data.success && data.reply) {
                addMessage(data.reply, 'bot', {
                    category: data.category,
                    guidance_type: data.guidance_type
                });
                showChips(data.follow_up_options);
            } else {
                addMessage(data.reply || 'Sorry, I could not process that. Please try again.', 'bot', { category: 'error' });
                showChips(['Try asking again', 'What can you help me with?']);
            }

        } catch (err) {
            hideTyping();
            if (err.name === 'AbortError') {
                addMessage('The request timed out. The service might be busy — please try again.', 'bot', { category: 'error' });
            } else {
                addMessage('I\'m having trouble connecting. Please check your internet connection and try again.', 'bot', { category: 'error' });
            }
            showChips(['Try asking again', 'Road safety tips']);
            console.error('Saalai Kural Error:', err);
        } finally {
            isLoading = false;
            inputEl.disabled = false;
            sendBtn.disabled = !inputEl.value.trim();
            inputEl.focus();
        }
    }

    // ── Event Listeners ──
    inputEl.addEventListener('input', () => {
        sendBtn.disabled = !inputEl.value.trim() || isLoading;
    });

    inputEl.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    sendBtn.addEventListener('click', () => sendMessage());

    // ── Init ──
    renderWelcome();
    inputEl.focus();
    </script>
</body>
</html>
