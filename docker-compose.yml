# Pinned project name → stable container names (roadwatch-iit-m-*) on ANY machine,
# regardless of the folder the repo is cloned into.
name: roadwatch-iit-m

services:
  postgres:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: roadwatch
      POSTGRES_USER: roadwatch_user
      POSTGRES_PASSWORD: roadwatch_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data

  n8n:
    image: n8nio/n8n
    restart: always
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678
      - GENERIC_TIMEZONE=Asia/Kolkata
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  postgres_data:
  redis_data:
  n8n_data:
